<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Background Host</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/json;base64,ewogICJpZCI6ICJQeXRob25CYWNrZ3JvdW5kIiwKICAic2hvcnRfbmFtZSI6ICJQeXRob25CZyIsCiAgIm5hbWUiOiAiQmFja2dyb3VuZCBQeXRob24gU2VydmVyIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMxZTFlMWUiLAogICJ0aGVtZV9jb2xvciI6ICIjMWUxZTFlIgp9">

    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root { --bg: #121212; --accent: #bb86fc; }
        body { background: var(--bg); color: white; font-family: system-ui; margin: 0; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        textarea { width: 100%; height: 200px; background: #000; color: #0f0; border: 1px solid #444; border-radius: 8px; font-family: monospace; padding: 10px; box-sizing: border-box; }
        .status-bar { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; background: #555; }
        .dot.active { background: #03dac6; box-shadow: 0 0 8px #03dac6; }
        button { background: var(--accent); color: black; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Background Python Server</h3>
        <textarea id="editor" oninput="localStorage.setItem('bg_code', this.value)"># This code runs in the background
print("Server Heartbeat...")
display_html("<h1 style='color:cyan'>Background Active</h1>")</textarea>
        
        <div class="status-bar">
            <div id="status-light" class="dot"></div>
            <span id="status-text">Engine Offline</span>
        </div>
        
        <button onclick="runAndHost()">🚀 Start Background Host</button>
        <p id="peer-id" style="font-size: 12px; color: #888; text-align: center;"></p>
    </div>

    <script>
        let pyodide;
        let peer = null;

        // Load saved code
        if(localStorage.getItem('bg_code')) {
            document.getElementById("editor").value = localStorage.getItem('bg_code');
        }

        async function init() {
            pyodide = await loadPyodide();
            window.display_html = (h) => { 
                if (window.currentConn) window.currentConn.send(h); 
                console.log("Broadcasting UI update...");
            };
            await pyodide.runPython(`import js\ndef display_html(h):\n js.display_html(h)`);
            document.getElementById("status-text").innerText = "Python Ready";
            document.getElementById("status-light").classList.add('active');
        }
        init();

        function runAndHost() {
            if (!peer) {
                const id = 'py-bg-' + Math.floor(Math.random() * 9999);
                peer = new Peer(id);
                peer.on('open', (id) => {
                    document.getElementById("peer-id").innerText = "ID: " + id;
                    document.getElementById("status-text").innerText = "Server Live (Background)";
                });
                peer.on('connection', (conn) => {
                    window.currentConn = conn;
                    runPython(); // Execute and send when someone connects
                });
            }
            runPython();
        }

        async function runPython() {
            try {
                await pyodide.runPythonAsync(`import sys, io; sys.stdout = io.StringIO()`);
                await pyodide.runPythonAsync(document.getElementById("editor").value);
            } catch (e) { console.error(e); }
        }

        // --- THE BACKGROUND MAGIC ---
        if ('serviceWorker' in navigator) {
            const swSource = `
                self.addEventListener('install', (event) => {
                    self.skipWaiting();
                });
                self.addEventListener('activate', (event) => {
                    event.waitUntil(self.clients.claim());
                });
                // Background Sync / Push could be added here to wake up the script
            `;
            const blob = new Blob([swSource], { type: 'text/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }
    </script>
</body>
</html>
