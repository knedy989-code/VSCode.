<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pure Python Slap Battles</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        .tabs { display: flex; background: #111; }
        .tab { flex: 1; padding: 15px; text-align: center; border-bottom: 2px solid #333; }
        .tab.active { border-bottom: 2px solid #bb86fc; color: #bb86fc; }
        #editor { flex: 1; width: 100%; background: #000; color: #0f0; padding: 20px; font-size: 16px; border: none; outline: none; resize: none; }
        #preview { background: #fff; color: #000; height: 40%; overflow: auto; }
        .run { background: #bb86fc; color: #000; padding: 20px; font-weight: bold; border: none; font-size: 18px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active">PYTHON EDITOR</div>
    </div>

    <textarea id="editor" spellcheck="false">
# --- WRITE ONLY PYTHON BELOW ---
import js

slaps = 74204

def slap():
    global slaps
    slaps += 1
    render()

def render():
    # Use standard Python f-strings
    ui = f"""
    <div style='text-align:center; padding:20px;'>
        <h1>SLAP BATTLES</h1>
        <h2 style='font-size:50px;'>🖐️ {slaps}</h2>
        <button onclick='runPython("slap()")' style='padding:20px; background:cyan; border-radius:10px; font-weight:bold;'>SLAP!</button>
        <br><br>
        <button onclick='create_link()' style='padding:10px; background:#bb86fc;'>GET INVITE LINK</button>
    </div>
    """
    display_html(ui)

render()
    </textarea>

    <div id="preview"></div>
    <button class="run" onclick="runPython()">RUN PYTHON ONLY</button>

    <script>
        // THIS IS THE HIDDEN ENGINE - YOU NEVER HAVE TO TOUCH THIS
        let py;
        let peer;
        async function init() {
            py = await loadPyodide();
            window.display_html = (h) => { document.getElementById('preview').innerHTML = String(h); };
            window.create_link = () => {
                const id = 'idk12-' + Math.floor(Math.random()*9999);
                peer = new Peer(id);
                peer.on('open', (i) => {
                    const link = window.location.origin + window.location.pathname + '?join=' + i;
                    alert("SHARE THIS LINK:\n" + link);
                });
            };
            await py.runPythonAsync(`
import sys, io, os, js
class Shield(io.StringIO):
    def flush(self): pass
    def isatty(self): return False
    def fileno(self): return -1
sys.stdout = sys.stderr = Shield()
os.environ['HOME'] = '/tmp'
os.chdir('/tmp')
def display_html(h): js.display_html(h)
            `);
            console.log("Python Engine Ready");
        }
        init();
        async function runPython() {
            if(!py) return;
            try {
                await py.runPythonAsync(document.getElementById('editor').value);
            } catch (e) { alert("Python Error: " + e); }
        }
    </script>
</body>
</html>
