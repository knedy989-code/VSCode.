<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Offline OS</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/json;base64,ewogICJpZCI6ICJQeXRob25PZmZsaW5lIiwKICAic2hvcnRfbmFtZSI6ICJQeXRPUyIsCiAgIm5hbWUiOiAiUHl0aG9uIE9mZmxpbmUgQWdlbnQgT1MiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBlMGUwZSIsCiAgInRoZW1lX2NvbG9yIjogIiM2MjAwZWUiCn0=">

    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root { --bg: #0e0e0e; --panel: #1a1a1a; --text: #e0e0e0; --accent: #bb86fc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebars */
        .sidebar { width: 260px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Agent Section */
        .agent-box { background: #252525; border-radius: 8px; padding: 10px; margin-top: auto; border: 1px solid var(--accent); }
        #agent-input { width: 100%; background: transparent; border: none; color: white; outline: none; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }
        .agent-msg { font-size: 13px; color: var(--accent); margin-bottom: 5px; }

        /* Editor & Preview */
        #editor { flex: 1; background: var(--bg); color: #9cdcfe; border: none; padding: 20px; font-family: 'Consolas', monospace; font-size: 15px; outline: none; resize: none; }
        .bottom-panes { height: 35%; display: flex; border-top: 1px solid #333; }
        .pane { flex: 1; overflow: auto; padding: 10px; border-right: 1px solid #333; font-family: monospace; }
        #preview { background: white; color: black; }
        
        button { background: var(--accent); color: black; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .status { font-size: 11px; color: #666; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>PyOS Agent</h3>
        <div class="status" id="status">Loading Offline Engine...</div>
        
        <button onclick="runPython()">▶ Run Project</button>
        <button onclick="toggleHost()" style="background: #03dac6;">🌐 Host Server</button>
        
        <div class="agent-box">
            <div class="agent-msg" id="agent-out">I'm your coding agent. Try: "make a button" or "clear code".</div>
            <input type="text" id="agent-input" placeholder="Ask agent to do something..." onkeydown="if(event.key==='Enter') askAgent()">
        </div>
    </div>

    <div class="main">
        <textarea id="editor" spellcheck="false"># Active Coding
print("System Online")

display_html("<h1>Welcome to PyOS</h1>")</textarea>
        
        <div class="bottom-panes">
            <div class="pane" style="color: #0f0;" id="console">Console initialized...</div>
            <div class="pane" id="preview"></div>
        </div>
    </div>

    <script>
        let pyodide;
        const editor = document.getElementById("editor");
        const agentOut = document.getElementById("agent-out");

        async function init() {
            pyodide = await loadPyodide();
            window.display_html = (h) => { document.getElementById("preview").innerHTML = h; };
            await pyodide.runPython(`import js\ndef display_html(h): js.display_html(h)`);
            document.getElementById("status").innerText = "OFFLINE READY";
        }
        init();

        // --- THE ACTIVE AGENT LOGIC ---
        function askAgent() {
            const input = document.getElementById("agent-input");
            const cmd = input.value.toLowerCase();
            input.value = "";

            if (cmd.includes("button")) {
                agentOut.innerText = "Generating button code...";
                editor.value += `\ndisplay_html("<button style='padding:20px; background:purple; color:white;'>Dynamic Button</button>")`;
                runPython();
            } else if (cmd.includes("clear")) {
                editor.value = "";
                agentOut.innerText = "Code cleared.";
            } else if (cmd.includes("loop")) {
                editor.value += `\nfor i in range(5):\n    print(f"Looping: {i}")`;
                agentOut.innerText = "Added a for-loop.";
            } else if (cmd.includes("hello")) {
                agentOut.innerText = "Hello! I can write loops, buttons, and clear your console.";
            } else {
                agentOut.innerText = "I don't know that yet. Try 'make a button'.";
            }
        }

        async function runPython() {
            try {
                await pyodide.runPythonAsync(`import sys, io; sys.stdout = io.StringIO()`);
                await pyodide.runPythonAsync(editor.value);
                document.getElementById("console").innerText = pyodide.runPython("sys.stdout.getvalue()");
            } catch (e) { document.getElementById("console").innerText = e; }
        }

        // --- SERVICE WORKER (OFFLINE SUPPORT) ---
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'py-offline-v1';
                const ASSETS = [
                    'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js',
                    'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js'
                ];
                self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([swCode], { type: 'text/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }
    </script>
</body>
</html>
