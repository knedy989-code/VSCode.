<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Real Gemini Game Studio</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        :root { --bg: #0d0d0d; --sidebar: #161616; --gemini: linear-gradient(135deg, #4285f4, #9b72cb, #d96570); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .gemini-header { background: var(--gemini); padding: 20px; font-weight: 800; text-align: center; font-size: 14px; letter-spacing: 2px; }
        
        #workspace { flex: 1; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        #container { display: flex; flex: 1; overflow: hidden; }
        #editor { flex: 1; border-right: 1px solid #333; }
        #preview { flex: 1; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        .panel { padding: 20px; border-bottom: 1px solid #333; }
        textarea { width: calc(100% - 24px); background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 15px; outline: none; height: 80px; resize: none; }
        .btn { width: 100%; background: var(--gemini); border: none; color: white; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #console { height: 140px; background: #000; color: #8ab4f8; font-family: monospace; font-size: 11px; padding: 15px; overflow-y: auto; border-top: 1px solid #333; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="gemini-header">REAL GEMINI API AGENT</div>
    <div class="panel">
        <textarea id="ai-q" placeholder="Describe EXACTLY what game you want to generate..."></textarea>
        <button class="btn" onclick="generateRealGame()">GENERATE CUSTOM GAME</button>
    </div>
    <div class="panel">
        <button class="btn" style="background:#28a745;" onclick="copyGame()">SHARE GAME</button>
    </div>
    <div id="console">> System Online. API Key Active. Ready to build.</div>
</div>

<div id="workspace">
    <div id="container">
        <div id="editor"></div>
        <div id="preview"><iframe id="live-frame" sandbox="allow-scripts allow-modals"></iframe></div>
    </div>
</div>

<script>
    // --- YOUR LIVE API KEY ---
    const GEMINI_API_KEY = "AIzaSyAH1MTUVFptPlzEVwWfftePD7q1wxZ2udY"; 
    // -------------------------

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        window.editor = monaco.editor.create(document.getElementById('editor'), {
            value: "", // Starts empty so the AI can fill it
            language: 'html', theme: 'vs-dark', fontSize: 16, automaticLayout: true, minimap: { enabled: false }
        });

        const update = () => { document.getElementById('live-frame').srcdoc = window.editor.getValue(); };
        window.editor.onDidChangeModelContent(update);
    });

    async function generateRealGame() {
        const prompt = document.getElementById('ai-q').value;
        const con = document.getElementById('console');
        
        if (!prompt) return;

        con.innerHTML += `<br>> Contacting Gemini API in the cloud...`;
        con.innerHTML += `<br>> Writing custom code for: "${prompt}"... (Please wait 5-10 seconds)`;
        con.scrollTop = con.scrollHeight;

        try {
            // Sends the request to Google's servers
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `You are an expert game developer. Write a single HTML file containing a fully playable web game based on this prompt: "${prompt}". The game must include all necessary CSS styling and JavaScript logic within the single file. Do not include markdown formatting like \`\`\`html in your response. Output ONLY the raw code.`
                        }]
                    }]
                })
            });

            const data = await response.json();
            
            if(data.error) {
                con.innerHTML += `<br><span style="color:red;">> API Error: ${data.error.message}</span>`;
                return;
            }

            let generatedCode = data.candidates[0].content.parts[0].text;
            
            // Strip out any markdown formatting the AI might try to add
            generatedCode = generatedCode.replace(/```html/g, '').replace(/```/g, '').trim();

            window.editor.setValue(generatedCode);
            document.getElementById('ai-q').value = "";
            con.innerHTML += `<br>> Success! Custom game code injected.`;
            con.scrollTop = con.scrollHeight;

        } catch (error) {
            con.innerHTML += `<br><span style="color:red;">> Network Error: Could not reach the API. Check your internet connection.</span>`;
        }
    }

    function copyGame() {
        const b64 = btoa(unescape(encodeURIComponent(window.editor.getValue())));
        navigator.clipboard.writeText("data:text/html;base64," + b64).then(() => alert("Game Link Copied!"));
    }
</script>
</body>
</html>
