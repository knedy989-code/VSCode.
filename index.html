<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad PyOS EOF-Fix</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root { --accent: #bb86fc; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui; height: 100vh; display: flex; flex-direction: column; }
        .tabs { display: flex; background: #111; border-bottom: 2px solid var(--accent); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #666; font-weight: bold; }
        .tab-btn.active { color: var(--accent); background: #1a1a1a; }
        .view { flex: 1; display: none; }
        .view.active { display: block; }
        textarea { width: 100%; height: 100%; background: #000; color: #0f0; padding: 15px; font-family: monospace; font-size: 16px; border: none; outline: none; box-sizing: border-box; }
        #preview { background: white; color: black; height: 100%; padding: 15px; }
        .footer { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; }
        .run-btn { background: var(--accent); color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="tab('ed')">EDITOR</button>
        <button class="tab-btn" onclick="tab('pre')">PREVIEW</button>
    </div>

    <div id="ed" class="view active">
        <textarea id="editor" spellcheck="false"># EOF ERROR FIXED
# The agent patched 'input()' to stop crashes.

def start_game():
    display_html("""
        <div style='text-align:center;'>
            <h2>The Game</h2>
            <button onclick='runPython("play_action()")' style='padding:20px;'>
                CLICK TO PLAY
            </button>
        </div>
    """)

def play_action():
    print("Action Button Clicked!")
    display_html("<h1 style='color:green;'>YOU WON!</h1>")

start_game()</textarea>
    </div>

    <div id="pre" class="view"><div id="preview"></div></div>

    <div class="footer">
        <button class="run-btn" onclick="runPython()">RUN CODE</button>
    </div>

    <script>
        let py;
        function tab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        async function init() {
            py = await loadPyodide();
            window.display_html = (h) => { document.getElementById('preview').innerHTML = h; };
            
            await py.runPythonAsync(`
import js, builtins

# THE EOF FIX: Override input so it returns a blank string instead of crashing
def mocked_input(prompt=""):
    return ""
builtins.input = mocked_input

def display_html(h):
    js.display_html(h)
            `);
            console.log("EOF Shield Active");
        }
        init();

        async function runPython(specificCode = null) {
            if(!py) return;
            try {
                const codeToRun = specificCode || document.getElementById('editor').value;
                await py.runPythonAsync(codeToRun);
                tab('pre');
            } catch (e) {
                alert("Error: " + e);
            }
        }
    </script>
</body>
</html>
