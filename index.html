<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PyOS Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,ewogICJzaG9ydF9uYW1lIjogIlB5T1MiLAogICJuYW1lIjogIlB5dGhvbiBPZmZsaW5lIFBybyIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAic2hvd19uYW1lIjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwMDAwMDAiLAogICJ0aGVtZV9jb2xvciI6ICIjYmI4NmZjIgp9">

    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root { --accent: #bb86fc; --bg: #000000; --card: #121212; --text: #e0e0e0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }

        /* Sidebar / Agent Area */
        .sidebar {
            width: 280px; background: #080808; border-right: 1px solid #222;
            display: flex; flex-direction: column; padding: 20px; z-index: 10;
        }
        
        .agent-card {
            background: linear-gradient(145deg, #1a1a1a, #111);
            border: 1px solid var(--accent); border-radius: 12px;
            padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(187, 134, 252, 0.1);
        }

        .main-stage { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Tabs */
        .tabs { display: flex; background: #000; padding: 5px 10px 0; gap: 5px; }
        .tab-btn {
            background: #111; border: none; color: #666; padding: 12px 20px;
            border-radius: 8px 8px 0 0; font-weight: 600; font-size: 13px; transition: 0.2s;
        }
        .tab-btn.active { background: var(--card); color: var(--accent); }

        .view { flex: 1; display: none; background: var(--card); }
        .view.active { display: block; }

        #editor {
            width: 100%; height: 100%; background: transparent; color: #9cdcfe;
            border: none; padding: 20px; font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 16px; outline: none; resize: none;
        }

        #preview-frame { background: white; color: black; height: 100%; overflow: auto; padding: 0; }

        /* Controls */
        .bottom-bar {
            padding: 15px 20px; background: #080808; border-top: 1px solid #222;
            display: flex; align-items: center; gap: 15px;
        }

        .input-box {
            flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 25px;
            padding: 12px 20px; color: white; outline: none; transition: 0.3s;
        }
        .input-box:focus { border-color: var(--accent); }

        .run-btn {
            background: var(--accent); color: black; border: none; border-radius: 25px;
            padding: 12px 25px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(187, 134, 252, 0.4);
        }

        #status-pill { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="margin: 0 0 20px; font-size: 22px; color: var(--accent);">PyOS <span style="font-weight: 200; color: white;">Pro</span></h2>
        
        <div class="agent-card">
            <div style="font-size: 11px; color: var(--accent); margin-bottom: 5px; font-weight: bold;">AI AGENT</div>
            <div id="agent-msg" style="font-size: 14px; line-height: 1.4;">System is booting. Standby...</div>
        </div>

        <div id="status-pill">Ready for code</div>
        <div id="host-display" style="margin-top: 10px; font-family: monospace; font-size: 12px; color: #03dac6;"></div>
        
        <button onclick="startHost()" style="margin-top: auto; background: transparent; border: 1px solid #333; color: #888; padding: 10px; border-radius: 8px; font-size: 12px;">Start P2P Hosting</button>
    </div>

    <div class="main-stage">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('edit-view', this)">EDITOR</button>
            <button class="tab-btn" onclick="switchTab('prev-view', this)">UI PREVIEW</button>
            <button class="tab-btn" onclick="switchTab('log-view', this)">SYSTEM LOGS</button>
        </div>

        <div id="edit-view" class="view active">
            <textarea id="editor" spellcheck="false"># PyOS Pro Final
import os

def load_game():
    # Real Python logic with I/O Fix
    slaps = 74204
    
    html = f"""
    <div style="padding: 40px; text-align: center; font-family: sans-serif;">
        <h1 style="color: #6200ee;">Slap Battles Mobile</h1>
        <div style="font-size: 48px; margin: 20px 0;">🖐️ {slaps}</div>
        <button onclick="runPython('slap()')" style="padding: 15px 30px; border-radius: 50px; border: none; background: #03dac6; font-weight: bold; font-size: 18px;">SLAP!</button>
    </div>
    """
    display_html(html)

def slap():
    print("User Slapped!")
    # Logic goes here...

load_game()</textarea>
        </div>

        <div id="prev-view" class="view">
            <div id="preview-frame"></div>
        </div>

        <div id="log-view" class="view">
            <div id="console-log" style="padding: 20px; font-family: monospace; color: #0f0; line-height: 1.5;"></div>
        </div>

        <div class="bottom-bar">
            <input type="text" id="agent-input" class="input-box" placeholder="Ask Agent to 'make a button' or 'fix my code'...">
            <button class="run-btn" onclick="runPython()">RUN PROJECT</button>
        </div>
    </div>

    <script>
        let py;
        let peer;

        function switchTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        async function init() {
            try {
                py = await loadPyodide();
                
                // THE HYBRID BRIDGE (JS SIDE)
                window.display_html = (data) => {
                    document.getElementById('preview-frame').innerHTML = String(data);
                };

                // THE NUCLEAR I/O SHIELD (PYTHON SIDE)
                await py.runPythonAsync(`
import sys, io, os, js

class iPadShield(io.StringIO):
    def flush(self): pass
    def isatty(self): return False
    def fileno(self): return -1

sys.stdout = iPadShield()
sys.stderr = iPadShield()

os.environ['HOME'] = '/tmp'
os.chdir('/tmp')

def display_html(h):
    js.display_html(h)
                `);

                document.getElementById('agent-msg').innerText = "Hybrid Bridge is ONLINE. I/O Shield Active.";
                document.getElementById('status-pill').innerText = "ENGINE: CONNECTED";
            } catch (e) {
                document.getElementById('agent-msg').innerText = "Boot Error: " + e;
            }
        }
        init();

        async function runPython(codeOverride = null) {
            if (!py) return;
            const log = document.getElementById('console-log');
            try {
                const code = codeOverride || document.getElementById('editor').value;
                await py.runPythonAsync("sys.stdout = iPadShield()"); // Reset buffer
                await py.runPythonAsync(code);
                
                const output = py.runPython("sys.stdout.getvalue()");
                if (output) log.innerText += "\n" + output;
                
                if(!codeOverride) switchTab('prev-view', document.querySelectorAll('.tab-btn')[1]);
            } catch (err) {
                log.innerText += "\nERROR: " + err;
                switchTab('log-view', document.querySelectorAll('.tab-btn')[2]);
                document.getElementById('agent-msg').innerText = "I found an error in your code. Check the logs.";
            }
        }

        // Agent Interaction
        document.getElementById('agent-input').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                let cmd = e.target.value.toLowerCase();
                if(cmd.includes('button')) {
                    document.getElementById('editor').value += '\ndisplay_html("<button style=\'padding:20px\'>Agent Button</button>")';
                    runPython();
                } else if(cmd.includes('clear')) {
                    document.getElementById('editor').value = "";
                    document.getElementById('console-log').innerText = "";
                }
                e.target.value = '';
            }
        });

        function startHost() {
            const id = 'idk12-pro-' + Math.floor(Math.random() * 9999);
            peer = new Peer(id);
            peer.on('open', (gid) => {
                document.getElementById('host-display').innerText = "P2P ID: " + gid;
                document.getElementById('agent-msg').innerText = "Hosting started. Share your P2P ID with friends!";
            });
        }
    </script>
</body>
</html>
