<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PyOS Safe-Type</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: system-ui; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #editor { flex: 1; background: #000; color: #0f0; padding: 20px; font-family: monospace; font-size: 18px; border: none; outline: none; }
        #preview { height: 30%; background: #fff; color: #000; padding: 15px; overflow: auto; }
        .btn { background: #bb86fc; padding: 20px; border: none; font-weight: bold; width: 100%; font-size: 18px; }
    </style>
</head>
<body>

    <textarea id="editor" spellcheck="false"># This used to cause a TypeError
score = 74204
display_html("Current Slaps: " + str(score))

# The bridge now handles direct numbers too!
display_html(score)</textarea>
    
    <div id="preview"></div>
    <button class="btn" onclick="runPython()">RUN PROJECT</button>

    <script>
        let py;
        async function init() {
            py = await loadPyodide();
            
            // THE SAFETY BRIDGE
            window.display_html = (data) => {
                // This line converts EVERYTHING to a string before showing it
                // This prevents the "TypeError" on the browser side.
                document.getElementById('preview').innerHTML = String(data);
            };

            await py.runPythonAsync(`
import js
def display_html(h):
    js.display_html(h)
            `);
        }
        init();

        async function runPython() {
            if(!py) return;
            try {
                await py.runPythonAsync(document.getElementById('editor').value);
            } catch (e) {
                // If there is still a TypeError, this alert tells you exactly where
                alert("TYPE ERROR DETECTED:\n" + e);
            }
        }
    </script>
</body>
</html>
