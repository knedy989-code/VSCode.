<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PyOS iPad Shield v2</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        :root { --accent: #bb86fc; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: system-ui; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 10px; background: #111; border-bottom: 2px solid var(--accent); font-weight: bold; text-align: center; }
        .tabs { display: flex; background: #000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #666; font-weight: bold; border-bottom: 2px solid #333; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: #1a1a1a; }
        .view { flex: 1; display: none; overflow: auto; }
        .view.active { display: block; }
        #editor { width: 100%; height: 100%; background: #000; color: #9cdcfe; padding: 15px; font-family: monospace; font-size: 16px; border: none; outline: none; box-sizing: border-box; }
        #preview { background: white; color: black; min-height: 100%; padding: 15px; }
        #console { background: #000; color: #0f0; padding: 15px; font-family: monospace; white-space: pre-wrap; font-size: 12px; }
        .footer { padding: 15px; background: #1a1a1a; border-top: 1px solid #333; }
        .run-btn { background: var(--accent); color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">iPad I/O Shield v2</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="tab('edit')">CODE</button>
        <button class="tab-btn" onclick="tab('prev')">UI PREVIEW</button>
        <button class="tab-btn" onclick="tab('cons')">LOGS</button>
    </div>

    <div id="edit" class="view active"><textarea id="editor" spellcheck="false"># iPad I/O Shield Active
import os

print("--- SYSTEM CHECK ---")

# Virtual Disk Write
with open("test.txt", "w") as f:
    f.write("I/O Fixed on iPad!")

with open("test.txt", "r") as f:
    content = f.read()

display_html(f"<h1 style='color:green'>SUCCESS</h1><p>{content}</p>")
print("Stability: LOCKED")</textarea></div>
    
    <div id="prev" class="view"><div id="preview"></div></div>
    <div id="cons" class="view"><div id="console">Initializing Virtual System...</div></div>

    <div class="footer">
        <button class="run-btn" onclick="runPython()">RUN PROJECT</button>
    </div>

    <script>
        let py;

        function tab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        async function init() {
            try {
                // Initialize Pyodide with custom I/O overrides
                py = await loadPyodide({
                    stdout: (text) => { document.getElementById('console').innerText += text + "\n"; },
                    stderr: (text) => { console.error(text); }
                });

                // THE "LOW-LEVEL" I/O FIX
                await py.runPythonAsync(`
import sys
import io
import os
import js

# 1. Total Stream Isolation
class VirtualIO(io.TextIOBase):
    def write(self, s):
        if s.strip():
            js.console.log(s)
        return len(s)
    def flush(self): pass
    def isatty(self): return False
    def fileno(self): return -1 # CRITICAL: This stops the hardware check

sys.stdout = VirtualIO()
sys.stderr = VirtualIO()
sys.stdin = io.StringIO() # Block any keyboard requests

# 2. Virtual Root
os.environ['HOME'] = '/tmp'
os.chdir('/tmp')

def display_html(html):
    js.document.getElementById('preview').innerHTML = html
                `);

                document.getElementById('console').innerText = "iPad VFS Locked. Engine Ready.";
            } catch (e) {
                document.getElementById('console').innerText = "VFS Error: " + e;
            }
        }
        init();

        async function runPython() {
            if(!py) return;
            const log = document.getElementById('console');
            log.innerText = "Running...\n";
            try {
                await py.runPythonAsync(document.getElementById('editor').value);
                tab('prev');
            } catch (err) {
                log.innerText = "CRITICAL ERROR:\n" + err;
                tab('cons');
            }
        }
    </script>
</body>
</html>
